<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Reply Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    header .subtitle { font-size: 13px; opacity: 0.6; margin-top: 2px; }

    .badge {
      background: #4f46e5;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    main { max-width: 860px; margin: 32px auto; padding: 0 20px; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #555; }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }

    .card-header {
      padding: 18px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-header .meta { flex: 1; }
    .card-header .from { font-weight: 600; font-size: 15px; color: #1a1a2e; }
    .card-header .subject { font-size: 13px; color: #555; margin-top: 3px; }
    .card-header .time { font-size: 12px; color: #aaa; white-space: nowrap; margin-top: 4px; }

    .card-body { padding: 0; }
    .section { padding: 16px 24px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .original-text {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      max-height: 120px;
      overflow-y: auto;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
    }

    .divider { border: none; border-top: 1px solid #f0f0f0; }

    .draft-text {
      font-size: 14px;
      color: #1a1a2e;
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 60px;
      border: none;
      outline: none;
      width: 100%;
      resize: vertical;
      font-family: inherit;
      background: transparent;
    }

    .card-footer {
      padding: 14px 24px;
      background: #fafafa;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    button {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-send { background: #4f46e5; color: white; }
    .btn-send:hover { background: #4338ca; }
    .btn-discard { background: #f0f0f0; color: #555; }
    .btn-discard:hover { background: #e0e0e0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: white;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }

    .loading { text-align: center; padding: 60px; color: #aaa; font-size: 15px; }

    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 13px;
      padding: 7px 14px;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    .config-banner {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #92400e;
    }
    .config-banner strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📬 Email Reply Dashboard</h1>
    <div class="subtitle">Review and approve AI-generated replies</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="badge" id="count">0 pending</span>
    <button class="refresh-btn" onclick="loadDrafts()">↻ Refresh</button>
  </div>
</header>

<main id="main">
  <div class="loading">Loading drafts...</div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // IMPORTANT: Paste your Apps Script deployment URL below
  // It should look like: https://script.google.com/macros/s/ABC.../exec
  // ============================================================
  const SCRIPT_URL = "AKfycbyNPHjT_inJevMud6nUQaXSF5Jtsb8GoYrcp6hIVutHn8SQ5AmhdUdHDNveNRxVoGOL";

  async function api(action, extra = {}) {
    const params = new URLSearchParams({ action, ...extra });
    const res = await fetch(SCRIPT_URL + '?' + params.toString(), {
      method: 'GET',
      redirect: 'follow'
    });
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch(e) {
      console.error('Response was not JSON:', text);
      return { success: false, drafts: [], message: 'Invalid response from server' };
    }
  }

  async function loadDrafts() {
    document.getElementById('main').innerHTML = '<div class="loading">Loading drafts...</div>';
    try {
      const result = await api('getDrafts');
      if (!result.drafts) {
        document.getElementById('main').innerHTML = '<div class="loading">Error loading drafts. Check console for details.</div>';
        return;
      }
      document.getElementById('count').textContent = result.drafts.length + ' pending';
      renderDrafts(result.drafts);
    } catch(e) {
      console.error('Load error:', e);
      document.getElementById('main').innerHTML = '<div class="loading">Connection error. Check console for details.</div>';
    }
  }

  function renderDrafts(drafts) {
    const main = document.getElementById('main');
    if (!drafts.length) {
      main.innerHTML = `
        <div class="empty-state">
          <div class="icon">✅</div>
          <h2>All caught up!</h2>
          <p>No pending email drafts to review.</p>
        </div>`;
      return;
    }

    main.innerHTML = drafts.map(d => `
      <div class="card" id="card-${d.threadId}">
        <div class="card-header">
          <div class="meta">
            <div class="from">${escHtml(d.from)}</div>
            <div class="subject">${escHtml(d.subject)}</div>
          </div>
          <div class="time">${formatTime(d.timestamp)}</div>
        </div>
        <div class="card-body">
          <div class="section">
            <div class="section-label">Original Email</div>
            <div class="original-text">${escHtml(d.original.substring(0, 800))}${d.original.length > 800 ? '...' : ''}</div>
          </div>
          <hr class="divider">
          <div class="section">
            <div class="section-label">Draft Reply — edit before sending</div>
            <textarea class="draft-text" id="draft-${d.threadId}">${escHtml(d.draft)}</textarea>
          </div>
        </div>
        <div class="card-footer">
          <button class="btn-discard" onclick="discard('${d.threadId}')">Discard</button>
          <button class="btn-send" onclick="send('${d.threadId}')">Send Reply</button>
        </div>
      </div>
    `).join('');
  }

  async function send(threadId) {
    const btns = document.querySelectorAll(`#card-${threadId} button`);
    btns.forEach(b => b.disabled = true);
    const result = await api('send', { threadId });
    if (result.success) {
      document.getElementById('card-' + threadId).remove();
      updateCount(-1);
      showToast('Reply sent! ✓', 'success');
    } else {
      btns.forEach(b => b.disabled = false);
      showToast('Error: ' + (result.message || 'Unknown error'), 'error');
    }
  }

  async function discard(threadId) {
    const btns = document.querySelectorAll(`#card-${threadId} button`);
    btns.forEach(b => b.disabled = true);
    const result = await api('discard', { threadId });
    if (result.success) {
      document.getElementById('card-' + threadId).remove();
      updateCount(-1);
      showToast('Draft discarded', 'success');
    } else {
      btns.forEach(b => b.disabled = false);
      showToast('Error: ' + (result.message || 'Unknown error'), 'error');
    }
  }

  function updateCount(delta) {
    const el = document.getElementById('count');
    const current = parseInt(el.textContent) + delta;
    el.textContent = current + ' pending';
    if (!document.querySelector('.card')) {
      document.getElementById('main').innerHTML = `
        <div class="empty-state">
          <div class="icon">✅</div>
          <h2>All caught up!</h2>
          <p>No pending email drafts to review.</p>
        </div>`;
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.className = 'toast', 3000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // Check config on load
  if (SCRIPT_URL === "AKfycbyNPHjT_inJevMud6nUQaXSF5Jtsb8GoYrcp6hIVutHn8SQ5AmhdUdHDNveNRxVoGOL") {
    document.getElementById('main').innerHTML = `
      <div class="config-banner">
        <strong>⚠️ Setup Required</strong>
        Open this HTML file in a text editor and replace YOUR_APPS_SCRIPT_DEPLOYMENT_URL_HERE with your actual deployment URL.
      </div>`;
  } else {
    loadDrafts();
  }
</script>
</body>
</html>
